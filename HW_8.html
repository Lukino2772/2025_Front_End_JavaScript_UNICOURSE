<!DOCTYPE html>
<html>
<head>
    <title>odd or even</title>
</head>
<body>
<script>
let num = prompt("enter num");
num = Number(num);
if (!isNaN(num)){
    if(num %2===0){
        alert("რიცხვი ლუწია");
    }else{
        alert("რიცხვი კენტია");
    }
} else {
    alert("error");
}
</script>

</body>
</html>
